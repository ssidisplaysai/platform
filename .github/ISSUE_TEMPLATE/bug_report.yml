name: Bug report
description: Report a defect in Genesis platform, tooling, or docs.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the defect.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Explain user, engineering, or program impact.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Exact steps and inputs.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, test output, screenshots, links.
  - type: input
    id: owner
    attributes:
      label: Suspected Ownership
      placeholder: compiler-platform / runtime / docs / governance / unknown
