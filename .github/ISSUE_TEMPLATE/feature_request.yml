name: Feature request
description: Request an engineering enhancement aligned to approved architecture.
title: "[Feature]: "
labels:
  - enhancement
  - triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe expected behavior and scope.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Architecture Boundaries
      description: Confirm no architecture redesign is required.
      placeholder: "No architecture change required / RAR required"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Measurable completion criteria.
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Proposed Owner
