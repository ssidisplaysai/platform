entity: Vendor
displayName: Vendor
pluralName: Vendors
description: Represents a vendor/supplier in the supply chain domain

fields:
  id:
    type: identifier
    description: Unique vendor identifier
    required: true
    generated: true
  
  vendorNumber:
    type: string
    description: Unique vendor reference number
    required: true
    unique: true
    maxLength: 50
  
  name:
    type: string
    description: Vendor trading name
    required: true
    maxLength: 255
  
  legalName:
    type: string
    description: Vendor legal business name
    required: true
    maxLength: 255
  
  status:
    type: enum
    description: Vendor lifecycle status
    values:
      - DRAFT
      - ACTIVE
      - SUSPENDED
      - INACTIVE
      - ARCHIVED
    default: DRAFT
  
  vendorType:
    type: enum
    description: Category of vendor
    values:
      - SUPPLIER
      - CONTRACTOR
      - CONSULTANT
      - DISTRIBUTOR
      - MANUFACTURER
      - SERVICE_PROVIDER
    default: SUPPLIER
  
  contactName:
    type: string
    description: Primary contact person name
    required: false
    maxLength: 255
  
  email:
    type: email
    description: Primary email address
    required: true
    unique: true
  
  phone:
    type: string
    description: Primary phone number
    required: false
    maxLength: 20
  
  website:
    type: string
    description: Vendor website URL
    required: false
    maxLength: 255
  
  billingAddress:
    type: string
    description: Billing address
    required: false
    maxLength: 500
  
  shippingAddress:
    type: string
    description: Default shipping address
    required: false
    maxLength: 500
  
  paymentTerms:
    type: enum
    description: Payment terms
    values:
      - NET_30
      - NET_60
      - NET_90
      - COD
      - PREPAY
      - DEPOSIT
    default: NET_30
  
  taxId:
    type: string
    description: Tax identification number
    required: false
    unique: true
    maxLength: 50
  
  notes:
    type: string
    description: General notes about the vendor
    required: false
    maxLength: 2000
  
  createdAt:
    type: timestamp
    description: When the vendor was created
    generated: true
  
  updatedAt:
    type: timestamp
    description: When the vendor was last updated
    generated: true
    autoUpdate: true

relationships:
  purchaseOrders:
    type: OneToMany
    target: PurchaseOrder
    description: Purchase orders placed with this vendor
    lazyLoad: true

  inventoryItems:
    type: OneToMany
    target: InventoryItem
    description: Inventory items supplied by this vendor
    lazyLoad: true

  organization:
    type: ManyToOne
    target: Organization
    description: Organization this vendor belongs to
    lazyLoad: true

capabilities:
  search:
    enabled: true
    fields:
      - name
      - vendorNumber
      - email
      - contactName
  
  audit:
    enabled: true
    trackChanges: true
  
  validation:
    enabled: true
  
  permissions:
    enabled: true
    roles:
      - admin
      - procurement
      - viewer

lifecycle:
  initial: PROSPECTING
  states:
    PROSPECTING:
      description: Vendor is being evaluated
      transitions:
        - QUALIFIED
        - REJECTED
    QUALIFIED:
      description: Vendor has been qualified
      transitions:
        - ACTIVE
        - REJECTED
    ACTIVE:
      description: Vendor is actively supplying
      transitions:
        - INACTIVE
        - SUSPENDED
        - ARCHIVED
    INACTIVE:
      description: Vendor is inactive
      transitions:
        - ACTIVE
        - ARCHIVED
    SUSPENDED:
      description: Vendor is suspended temporarily
      transitions:
        - ACTIVE
        - ARCHIVED
    REJECTED:
      description: Vendor has been rejected
      transitions: []
    ARCHIVED:
      description: Vendor record is archived
      transitions: []
  softDelete: true
  archived: true
  versioning: true

metadata:
  namespace: supply-chain
  icon: building
  color: green
  searchable: true
  orderable: true
  tags:
    - entity
    - core
    - supply-chain
    - vendor
