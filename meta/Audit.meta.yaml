# Genesis Meta Model: Audit

## Core Concept

Audit tracks who did what, when, and why.

Every Audit trail inherits these canonical properties.

---

## Universal Audit Properties

### Creation Tracking

- **createdBy** - Who created the entity
- **createdAt** - When entity was created
- **createdByUserId** - User ID who created
- **creationSource** - How was it created (UI, API, import)

### Modification Tracking

- **modifiedBy** - Who last modified
- **modifiedAt** - When last modified
- **modifiedByUserId** - User ID who modified
- **modificationCount** - Total modifications

### Deletion Tracking

- **deletedBy** - Who deleted (if soft-deleted)
- **deletedAt** - When deleted
- **deletedByUserId** - User ID who deleted
- **deletionReason** - Why was it deleted

### Field-Level Audit

For important fields:

- **fieldName** - Which field changed
- **oldValue** - Previous value
- **newValue** - New value
- **changedBy** - Who changed it
- **changedAt** - When changed

### Approval Tracking

- **approvedBy** - Who approved
- **approvedAt** - When approved
- **approvalComments** - Approval notes
- **rejectedBy** - Who rejected (if rejected)
- **rejectionReason** - Why rejected

---

## Audit Log Structure

Complete audit log for an entity:

```json
{
  "entityId": "cust_123",
  "entityType": "Customer",
  
  "creationAudit": {
    "createdBy": "user_456",
    "createdAt": "2026-01-01T10:00:00Z",
    "createdByUserId": "user_456",
    "creationSource": "UI"
  },
  
  "modificationHistory": [
    {
      "modifiedBy": "user_789",
      "modifiedAt": "2026-02-15T14:30:00Z",
      "fields": [
        {
          "fieldName": "status",
          "oldValue": "PROSPECT",
          "newValue": "ACTIVE"
        }
      ]
    },
    {
      "modifiedBy": "user_456",
      "modifiedAt": "2026-03-20T09:15:00Z",
      "fields": [
        {
          "fieldName": "name",
          "oldValue": "Acme Corp",
          "newValue": "Acme Corporation"
        }
      ]
    }
  ],
  
  "approvalHistory": [
    {
      "approvedBy": "admin_001",
      "approvedAt": "2026-02-16T10:00:00Z",
      "approvalComments": "Looks good"
    }
  ],
  
  "lastModified": {
    "modifiedBy": "user_456",
    "modifiedAt": "2026-03-20T09:15:00Z"
