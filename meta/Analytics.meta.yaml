## Design Principles

### 1. Actionable
Metrics drive decisions.

### 2. Accessible
Non-technical users can use analytics.

### 3. Timely
Data is current and up-to-date.

### 4. Accurate
Metrics are calculated correctly.

### 5. Scalable
Works with large datasets.

### 6. Extensible
Add new metrics anytime.

