## Dashboards

Visualization configuration:

```yaml
dashboards:
  - name: ExecutiveDashboard
    widgets:
      - type: metric
        kpi: CustomerGrowth
        period: month
      
      - type: timeseries
        measure: count
        dimension: createdAt
        period: day
      
      - type: pie
        dimension: status
        measure: count
      
      - type: bar
        dimension: industry
        measure: avgCustomerValue
      
      - type: table
        dimension: [status, industry]
        measures: [count, avgValue]
```

---

## Reports

Scheduled reports:

```yaml
reports:
  - name: MonthlyCustomerReport
    schedule: "0 8 1 * *"  # 1st of month at 8am
    
    sections:
      - title: Executive Summary
        widgets:
          - type: metric
            kpi: CustomerGrowth
            format: "{change}% month-over-month"
      
      - title: Detailed Analysis
        widgets:
          - type: table
            dimension: [industry, status]
            measures: [count, avgValue, growthRate]
      
      - title: Trends
        widgets:
          - type: timeseries
            measure: count
            dimension: createdAt
            period: week
    
    outputs:
      - format: pdf
        email: executives@company.com
      - format: csv
        store: s3://reports/
```

