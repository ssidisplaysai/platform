# Genesis Meta Model: Analytics

## Core Concept

Analytics provides insight into entity data and trends.

Every Analytics capability inherits these canonical properties.

---

## Universal Analytics Properties

### Measures

Quantifiable metrics:

- **sum** - Total/aggregate
- **count** - Number of entities
- **average** - Mean value
- **min** - Minimum value
- **max** - Maximum value
- **stddev** - Standard deviation
- **percentile** - Percentile values (p50, p95, p99)

### Dimensions

Categorical groupings:

- **temporal** - By time (day, week, month, year)
- **categorical** - By category field
- **geographic** - By location
- **hierarchical** - By hierarchy levels

### Aggregations

```yaml
aggregations:
  dailyMetrics:
    dimension: createdAt
    period: day
    measures:
      - count
      - avgRevenue
      - maxRevenue
  
  statusMetrics:
    dimension: status
    measures:
      - count
      - percentOfTotal
  
  industryMetrics:
    dimension: industry
    measures:
      - count
      - avgCustomerLifetimeValue
```

---

## KPIs (Key Performance Indicators)

Business metrics:

```yaml
kpis:
  - name: CustomerGrowth
    measure: count
    dimension: createdAt
    period: month
    target: 100
    threshold: warning at 50, critical at 25
  
  - name: ActiveCustomers
    filter: status == "ACTIVE"
    measure: count
    dimension: createdAt
    period: day
  
  - name: ChurnRate
    measure: count
    filter: status == "INACTIVE"
    dimension: createdAt
    period: month
    formula: "churned / previous_active"
  
  - name: AverageCustomerValue
    measure: average
    field: totalValue
    dimension: industry
```

