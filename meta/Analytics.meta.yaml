## Analytics Dimensions

Define analysis dimensions:

```yaml
analyticsDimensions:
  temporal:
    - granularity: day
      retention: 3 years
    - granularity: week
      retention: 5 years
    - granularity: month
      retention: 10 years
    - granularity: year
      retention: indefinite
  
  categorical:
    - field: status
      cardinality: low
    - field: industry
      cardinality: medium
    - field: region
      cardinality: medium
```

---

## Cohort Analysis

Analyze user groups:

```yaml
cohortAnalysis:
  - name: VintageCustomers
    segment: createdAt
    retention: [day_0, day_7, day_30, day_90, day_365]
    measures: [count, churnRate, ltv]
  
  - name: IndustryPerformance
    segment: industry
    measures: [avgLifetime, avgRevenue, retentionRate]
```

---

## Funnel Analysis

Track conversion funnels:

```yaml
funnelAnalysis:
  - name: CustomerAcquisitionFunnel
    steps:
      - name: Created
        filter: status in [Draft, Active, Inactive, Archived]
      - name: Activated
        filter: status = Active
      - name: Paying
        filter: status = Active AND has_payment_method
      - name: LongTermCustomer
        filter: status = Active AND created_at < 1_year_ago
```

