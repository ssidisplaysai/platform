## Analytics Data Retention

```yaml
analyticsRetention:
  rawData: 90 days
  dailyAggregates: 3 years
  weeklyAggregates: 5 years
  monthlyAggregates: 10 years
  yearlyAggregates: indefinite
  
  archiveLocation: s3://analytics-archive/
```

