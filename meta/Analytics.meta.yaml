## Attribution

Track conversion attribution:

```yaml
attribution:
  model: "multi-touch"
  
  touchpoints:
    - website_visit
    - email_campaign
    - sales_call
    - demo_request
  
  windows:
    - lookback: 30 days
    - credit: linear  # or first_touch, last_touch, position_based
```

