## Analytics Queries

```yaml
analyticsQueries:
  - name: "Revenue by Industry"
    query: |
      SELECT industry, SUM(revenue) as total_revenue, COUNT(*) as customer_count
      FROM customers
      WHERE status = 'ACTIVE'
      GROUP BY industry
      ORDER BY total_revenue DESC
  
  - name: "Monthly Growth Rate"
    query: |
      SELECT 
        DATE_TRUNC(created_at, MONTH) as month,
        COUNT(*) as new_customers,
        LAG(COUNT(*)) OVER (ORDER BY DATE_TRUNC(created_at, MONTH)) as prev_month_customers
      FROM customers
      GROUP BY DATE_TRUNC(created_at, MONTH)
      ORDER BY month DESC
```

