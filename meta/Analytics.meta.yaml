## Real-Time Analytics

Live metrics:

```yaml
realtimeAnalytics:
  enabled: true
  
  metrics:
    - name: ActiveSessions
      updateInterval: 1 second
    - name: ItemsCreatedToday
      updateInterval: 1 minute
    - name: StatusDistribution
      updateInterval: 5 minutes
```

