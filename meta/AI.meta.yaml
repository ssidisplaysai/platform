# Genesis Meta Model: AI

## Core Concept

AI integration enables intelligent features on entities.

Every AI capability inherits these canonical properties.

---

## Universal AI Properties

### Vectorization

Convert data to vectors for semantic search:

- **embeddings** - Generate embeddings for semantic search
- **embeddingModel** - Which model to use (OpenAI, Hugging Face, etc.)
- **embeddingDimension** - Vector dimensionality (1536, 3072, etc.)
- **vectorized** - Field is vectorized
- **searchable** - Searchable via vectors

### Text Generation

Generate text from entity data:

- **summarization** - Automatic text summarization
- **summaryLength** - Short/medium/long
- **keyPointExtraction** - Extract key points
- **abstractive** - Abstractive vs extractive
- **generative** - Generate new content

### Classification

Automatically classify data:

- **classification** - Classify entity/field
- **classifier** - Which classifier to use
- **categories** - Possible classifications
- **confidence** - Minimum confidence threshold
- **multiLabel** - Can have multiple labels

### Named Entity Recognition

Extract entities from text:

- **entityExtraction** - Extract named entities
- **entityTypes** - Types to extract (person, org, location, etc.)
- **linkedEntities** - Link to Genesis entities

### Sentiment Analysis

Analyze sentiment:

- **sentimentAnalysis** - Detect sentiment
- **scale** - negative/neutral/positive or -1.0 to 1.0
- **emotionDetection** - Detect emotions (happy, sad, angry, etc.)

### Tagging

Auto-generate tags:

- **autoTagging** - Generate tags automatically
- **tagCount** - Target number of tags
- **tagSource** - User-generated vs AI-generated
- **confidenceThreshold** - Minimum confidence

### Recommendations

Recommend related items:

- **recommendations** - Enable recommendations
- **algorithm** - collaborative, content-based, hybrid
- **recentItems** - Consider recent activity
- **similarItems** - Recommend similar items
- **popularItems** - Include popular items
- **personalizedItems** - Personalize by user

### Anomaly Detection

Detect unusual patterns:

- **anomalyDetection** - Detect anomalies
- **baseline** - Compute baseline behavior
- **threshold** - Anomaly threshold (std dev, percentile)
- **alerting** - Alert on anomalies

---

## AI Features

### Embeddings

Generate semantic embeddings:

```yaml
embeddings:
  enabled: true
  fields:
    - name
    - description
  model: text-embedding-3-small
  dimension: 1536
  updateFrequency: on_change
  storage: vector_db
  searchable: true
```

### Summarization

Auto-generate summaries:

```yaml
summarization:
  enabled: true
  fields:
    - description
    - longDescription
  summaryTypes:
    - executive: "2-3 sentences"
    - detailed: "1 paragraph"
    - brief: "1 sentence"
  model: gpt-4
  updateFrequency: on_change
```

### Classification

Auto-classify:

```yaml
classification:
  enabled: true
  field: description
  categories:
    - type: "industry"
      options: [Technology, Finance, Healthcare, Retail, Other]
    - type: "segment"
      options: [Enterprise, Mid-Market, SMB, Startup]
  model: custom_classifier
  confidenceThreshold: 0.8
```

### Entity Extraction

Extract entities:

```yaml
entityExtraction:
  enabled: true
  fields:
    - description
    - notes
  entityTypes:
    - PERSON
    - ORGANIZATION
    - LOCATION
    - PRODUCT
  linkToGenesis: true
  generateRelationships: true
```

### Sentiment Analysis

Analyze sentiment:

```yaml
sentimentAnalysis:
  enabled: true
  fields:
    - feedback
    - reviews
    - notes
  scale: "negative/neutral/positive"
  emotionDetection: true
  updateFrequency: daily
```

### Auto-Tagging

Generate tags:

```yaml
autoTagging:
  enabled: true
  fields:
    - name
    - description
  tagCount: 5
  confidenceThreshold: 0.7
  userCanOverride: true
  updateFrequency: on_change
```

### Recommendations

Recommend items:

```yaml
recommendations:
  enabled: true
  relatedEntityType: Customer
  algorithm: hybrid  # collaborative + content-based
  
  factors:
    - similarity: 0.6
    - popularity: 0.2
    - recency: 0.2
  
  resultsPerRequest: 5
  excludeViewed: true
```

### Anomaly Detection

Detect anomalies:

```yaml
anomalyDetection:
  enabled: true
  
  metrics:
    - field: revenue
      baseline: rolling_7day_average
      threshold: "2 std dev"
    - field: response_time
      baseline: hourly_average
      threshold: "> 500ms"
  
  alerting: true
  alertChannel: email
```

