# Genesis Meta Model: Entity

## Core Concept

The Entity is the universal concept in Genesis OS.

Every business object is an Entity.

Every Entity inherits these core concepts.

---

## Universal Entity Structure

### Identity

Every entity must have:

- **id** - Unique identifier (immutable)
- **entityType** - Classification
- **businessId** - Human-readable business identifier (optional)
- **globalId** - Globally unique identifier across systems

### Metadata

Every entity maintains:

- **name** - Display name
- **displayName** - Localized display name
- **description** - Human description
- **namespace** - Semantic namespace (e.g., "crm", "inventory", "finance")
- **version** - Entity definition version
- **schema** - Schema version for compatibility

### Properties

Every entity has a collection of:

- **fields** - Value properties
- **relationships** - Links to other entities
- **capabilities** - Enabled feature set

### Behavior

Every entity supports:

- **lifecycle** - State machine (Draft, Active, Inactive, Archived)
- **permissions** - Access control rules
- **events** - Domain events
- **audit** - Change tracking
- **automation** - Automation triggers and actions
- **search** - Full-text search capability
- **analytics** - Metrics and dimensions
- **ai** - AI features (embeddings, summarization)

### Governance

Every entity maintains:

- **status** - Current operational state
- **ownership** - Owner/steward information
- **classification** - Security and sensitivity classification
- **tags** - Categorization tags
- **timeline** - Historical timeline
- **knowledge** - Knowledge graph connections

### Standards

Every entity follows:

- **Deterministic Compilation** - Same definition → Same compiled artifact (always)
- **Immutable Snapshots** - Versions are immutable records
- **Audit Trail** - Complete change history
- **Composability** - Can be composed into larger entities
- **Extensibility** - Can be extended with custom properties
- **Interoperability** - Can reference entities across domains

---

## Entity Definition Schema

An entity definition specifies which aspects are enabled:

```
entity: EntityName
displayName: Human Readable Name
pluralName: EntityNames
description: What this entity represents
namespace: business.domain

# Core identity and metadata
metadata:
  businessIdPrefix: PREFIX
  icon: entity_icon_name
  color: theme_color
  searchable: true
  orderable: true

# Define the entity's properties
fields:
  - field definitions inherit from Field.meta.yaml

# Define relationships to other entities
relationships:
  - relationship definitions inherit from Relationship.meta.yaml

# Enable optional capabilities
capabilities:
  - capability definitions inherit from Capability.meta.yaml

# Configure lifecycle behavior
lifecycle:
  - lifecycle states inherit from Lifecycle.meta.yaml

# Define permission rules
permissions:
  - permission definitions inherit from Permission.meta.yaml

# Define events the entity emits
events:
  - event definitions inherit from Event.meta.yaml

# Configure audit tracking
audit:
  - audit settings inherit from Audit.meta.yaml

# Define automation rules
automation:
  - automation definitions inherit from Automation.meta.yaml

# Configure search behavior
search:
  - search settings inherit from Search.meta.yaml

# Configure analytics
analytics:
  - analytics settings inherit from Analytics.meta.yaml

# Configure AI features
ai:
  - ai settings inherit from AI.meta.yaml
```

---

## Inheritance Model

```
Genesis Meta Model
    ↓
    ├─ Entity.meta.yaml (Universal Entity properties)
    │   ├─ Field.meta.yaml (Property definitions)
    │   ├─ Relationship.meta.yaml (Entity relationships)
    │   ├─ Capability.meta.yaml (Feature set)
    │   ├─ Lifecycle.meta.yaml (State machine)
    │   ├─ Permission.meta.yaml (Access control)
    │   ├─ Event.meta.yaml (Domain events)
    │   ├─ Audit.meta.yaml (Change tracking)
    │   ├─ Automation.meta.yaml (Automation metadata)
    │   ├─ Search.meta.yaml (Search behavior)
    │   ├─ Analytics.meta.yaml (Analytics metadata)
    │   └─ AI.meta.yaml (AI features)
    │
    └─► Customer.entity.yaml (Extends Entity.meta.yaml)
    └─► Project.entity.yaml (Extends Entity.meta.yaml)
    └─► Company.entity.yaml (Extends Entity.meta.yaml)
    └─► ... (All future entities)
```

