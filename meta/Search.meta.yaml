# Genesis Meta Model: Search

## Core Concept

Search enables users to find entities efficiently.

Every Search capability inherits these canonical properties.

---

## Universal Search Properties

### Indexing

What gets indexed:

- **indexed** - Is field indexed?
- **analyzed** - Full-text analyzed?
- **tokenized** - Tokenized for search?
- **stemmed** - Stemming enabled?
- **boost** - Relevance boost factor (0.1 - 2.0)

### Search Features

- **searchable** - Can field be searched?
- **searchType** - Type of search (fulltext, exact, fuzzy, prefix)
- **wildcardSearch** - Support wildcard queries?
- **fuzzySearch** - Support fuzzy matching?
- **prefixSearch** - Support prefix queries?
- **phraseSearch** - Support phrase queries?

### Sorting

- **sortable** - Can field be sorted?
- **defaultSort** - Default sort order
- **sortDirection** - Ascending or descending

### Filtering

- **filterable** - Can field be filtered?
- **filterType** - Filter type (term, range, date)
- **multiValue** - Support multi-value filters?

### Faceting

- **facetable** - Can field be used for faceting?
- **facetLimit** - Max facet values to return
- **facetMinCount** - Minimum count for facet

### Autocomplete

- **suggestible** - Support autocomplete suggestions?
- **suggestionMinLength** - Min characters for suggestions
- **suggestionMaxResults** - Max suggestions to return

---

## Search Configuration

Entity-level search configuration:

```yaml
search:
  enabled: true
  
  indexing:
    strategy: automatic  # or manual
    frequency: immediate  # or batch
    batchSize: 1000
    batchIntervalMs: 60000
  
  defaultFields:
    - name
    - email
    - description
  
  facets:
    - field: status
      limit: 20
    - field: industry
      limit: 20
  
  sorting:
    default:
      field: createdAt
      direction: descending
  
  filtering:
    enabled: true
    multiSelect: true
  
  pagination:
    pageSize: 20
    maxPageSize: 100
```

---

## Search Index

Index configuration:

```yaml
searchIndex:
  type: elasticsearch  # or opensearch, solr, etc.
  
  mapping:
    properties:
      id:
        type: keyword
        index: true
      
      name:
        type: text
        analyzed: true
        boost: 2.0
      
      email:
        type: keyword
        index: true
        searchable: true
      
      status:
        type: keyword
        facet: true
        filter: true
      
      createdAt:
        type: date
        sortable: true
      
      description:
        type: text
        analyzed: true
        stemmed: true
  
  analyzer: standard
  tokenizer: standard
  filters:
    - lowercase
    - stop_words
    - stemmer
```

---

## Search Query Types

### Full-Text Search
```yaml
search:
  query: "Acme"
  searchType: fulltext
  fields: [name, description]
```

### Exact Match
```yaml
search:
  query: "ACTIVE"
  searchType: exact
  field: status
```

### Fuzzy Search
```yaml
search:
  query: "Ackne"  # Typo
  searchType: fuzzy
  fuzziness: AUTO
```

### Prefix Search
```yaml
search:
  prefix: "Acm"
  field: name
```

### Range Query
```yaml
search:
  range:
    field: createdAt
    from: "2026-01-01"
    to: "2026-12-31"
```

### Faceted Search
```yaml
search:
  query: "Acme"
  facets:
    - field: status
      limit: 20
    - field: industry
      limit: 20
  filters:
    status: ACTIVE
    industry: Technology
```

