## Design Principles

### 1. Speed
Search is fast and responsive.

### 2. Relevance
Results are ranked by relevance.

### 3. Discoverability
Faceting aids discoverability.

### 4. Accuracy
Results are accurate.

### 5. Accessibility
Search is accessible to all.

### 6. Scalability
Search scales to large datasets.

