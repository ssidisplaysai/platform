## Search Performance

Optimize search performance:

```yaml
searchPerformance:
  enableCaching: true
  cacheTTL: 3600
  
  indexing:
    batchSize: 1000
    commitInterval: 5000  # ms
  
  queries:
    maxResultSize: 10000
    timeout: 5000  # ms
  
  pagination:
    maxOffset: 100000
    preferCursorPagination: true
```

---

## Advanced Search Features

### Highlighting
Show search terms in results:

```yaml
highlighting:
  enabled: true
  fields:
    - name
    - description
  preTag: "<em>"
  postTag: "</em>"
```

### Suggestions
Auto-complete suggestions:

```yaml
suggestions:
  enabled: true
  field: name
  minChars: 2
  maxResults: 10
  fuzzy: true
```

### Geospatial Search
Search by distance:

```yaml
geospatialSearch:
  enabled: true
  field: location
  
  nearbySearch:
    latitude: 40.7128
    longitude: -74.0060
    radiusKm: 10
```

### Spell Correction
Correct misspellings:

```yaml
spellCorrection:
  enabled: true
  suggestAlternatives: true
```

