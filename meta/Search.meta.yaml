## Search Results

Search result format:

```json
{
  "total": 42,
  "took": 125,
  "results": [
    {
      "id": "cust_123",
      "name": "Acme Corporation",
      "email": "contact@acme.com",
      "status": "ACTIVE",
      "industry": "Technology",
      "score": 9.5,
      "highlights": {
        "name": "Acme <em>Corporation</em>",
        "description": "Leading provider of <em>Acme</em> solutions..."
      }
    }
  ],
  "facets": {
    "status": [
      { "value": "ACTIVE", "count": 35 },
      { "value": "INACTIVE", "count": 7 }
    ],
    "industry": [
      { "value": "Technology", "count": 20 },
      { "value": "Finance", "count": 15 }
    ]
  },
  "suggestions": [
    "Acme Inc",
    "Acme Group",
    "Acme Solutions"
  ]
}
```

