## Search Analytics

Track search behavior:

```yaml
searchAnalytics:
  enabled: true
  
  metrics:
    - totalSearches
    - uniqueSearchers
    - avgResultsPerSearch
    - searchesToNoResults
    - popularSearchTerms
    - avgTimeToResult
```

