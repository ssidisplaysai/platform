---

## Summary

The Search Meta Model defines **entity discovery** for Genesis entities.

Search provides:
- **Full-Text Search** - Find by text
- **Faceted Navigation** - Filter by dimensions
- **Autocomplete** - Help users find
- **Analytics** - Track search behavior
- **Performance** - Fast results
- **Scalability** - Handle large datasets

The Search Meta Model makes Genesis entities **discoverable and findable**.
