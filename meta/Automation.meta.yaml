# Genesis Meta Model: Automation

## Core Concept

Automation defines rules that execute automatically.

Every Automation inherits these canonical properties.

---

## Universal Automation Properties

### Triggers

What causes automation to run:

- **EventTrigger** - Triggered by event (Created, Updated, Deleted)
- **TimeTrigger** - Triggered by schedule (cron, interval)
- **DataTrigger** - Triggered by data condition
- **WebhookTrigger** - Triggered by external webhook
- **ManualTrigger** - Manually triggered by user

### Conditions

What must be true for automation to run:

- **field_condition** - Field value matches condition
- **status_condition** - Entity status matches
- **user_condition** - User has specific role
- **time_condition** - Runs during specific hours
- **threshold_condition** - Value crosses threshold

### Actions

What automation does:

- **SendNotification** - Send email, SMS, etc.
- **UpdateField** - Update entity field
- **CreateEntity** - Create related entity
- **DeleteEntity** - Delete entity
- **CallWebhook** - Call external API
- **TransitionState** - Change lifecycle state
- **AssignToUser** - Assign to team member
- **LogEvent** - Log custom event
- **ExecuteWorkflow** - Start workflow

### Execution

How automation runs:

- **synchronous** - Run immediately, block response
- **asynchronous** - Queue for background execution
- **scheduled** - Run on schedule
- **deferred** - Run after delay
- **eventually** - Run when possible (best effort)

### Error Handling

What happens on error:

- **retry** - Retry on failure
- **retryCount** - Number of retries
- **retryDelayMs** - Delay between retries
- **onFailure** - Action on final failure (skip, log, escalate)
- **deadLetterQueue** - Failed automations queue

---

## Automation Examples

### Send Welcome Email

```yaml
automations:
  - name: SendWelcomeEmail
    trigger: EntityCreated
    condition: entity.type == "Customer"
    actions:
      - type: SendNotification
        channel: email
        template: welcome_email
        to: entity.email
    execution: asynchronous
```

### Auto-Activate Entities

```yaml
automations:
  - name: AutoActivate
    trigger: DataUpdated
    condition: "entity.requirements_met == true"
    actions:
      - type: TransitionState
        from: Draft
        to: Active
    execution: synchronous
```

### Daily Reporting

```yaml
automations:
  - name: DailyReport
    trigger: ScheduledTime
    schedule: "0 8 * * MON-FRI"  # 8am weekdays
    actions:
      - type: CallWebhook
        url: "https://reporting-service/generate"
        method: POST
    execution: asynchronous
```

### Escalation Workflow

```yaml
automations:
  - name: EscalateOverdueItems
    trigger: ScheduledTime
    schedule: "0 9 * * *"  # Daily at 9am
    condition: "entity.status == 'Active' AND entity.dueDate < now()"
    actions:
      - type: UpdateField
        field: priority
        value: HIGH
      - type: AssignToUser
        role: manager
      - type: SendNotification
        channel: email
        template: overdue_notice
    execution: asynchronous
    retryCount: 3
```

### Webhook Integration

```yaml
automations:
  - name: SyncToExternalSystem
    trigger: EntityUpdated
    condition: "entity.synced == true"
    actions:
      - type: CallWebhook
        url: "https://external-api/sync"
        method: POST
        payload: entity
        timeout: 30000
    execution: asynchronous
    onFailure: escalate
```

