## Workflow Automation

Complex multi-step automations:

```yaml
workflows:
  - name: ApprovalProcess
    trigger: StateTransition
    from: Draft
    to: PendingApproval
    
    steps:
      - name: NotifyApprover
        action: SendNotification
        to: approver_role
      
      - name: WaitForApproval
        action: WaitFor
        event: ApprovalSubmitted
        timeout: 7days
      
      - name: UpdateStatus
        action: TransitionState
        to: Active
        condition: approval.approved == true
      
      - name: NotifyRequester
        action: SendNotification
        to: entity.createdBy
        message: "Approved!"
```

