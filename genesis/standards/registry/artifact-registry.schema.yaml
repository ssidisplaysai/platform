$schema: "https://json-schema.org/draft/2020-12/schema"
id: "genesis://standards/registry/artifact-registry.schema.yaml"
title: "Genesis Standards Artifact Registry Schema"
type: object
additionalProperties: false
required:
  - registryId
  - registryVersion
  - metadataSchema
  - artifactCount
  - artifacts
properties:
  registryId:
    type: string
    const: "GSP-REGISTRY-0001"
  registryVersion:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  metadataSchema:
    type: string
  artifactCount:
    type: integer
    minimum: 0
  artifacts:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - identifier
        - title
        - artifactType
        - status
        - version
        - authority
        - owners
        - path
        - dependencies
        - conformance
      properties:
        identifier:
          type: string
        title:
          type: string
        artifactType:
          type: string
        status:
          type: string
        version:
          type: string
        authority:
          type: string
        owners:
          type: array
          items:
            type: string
        path:
          type: string
        summary:
          type: string
        dependencies:
          type: array
          items:
            type: string
        conformance:
          type: object
          additionalProperties: false
          required:
            - framework
            - clauses
          properties:
            framework:
              type: string
            clauses:
              type: array
              items:
                type: string
