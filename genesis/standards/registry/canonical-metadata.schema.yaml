$schema: "https://json-schema.org/draft/2020-12/schema"
id: "genesis://standards/registry/canonical-metadata.schema.yaml"
title: "Genesis Constitutional Artifact Metadata Schema"
type: object
additionalProperties: false
required:
  - identifier
  - title
  - artifactType
  - status
  - version
  - authority
  - owners
  - path
  - dependencies
  - conformance
properties:
  identifier:
    type: string
    pattern: "^[A-Z]{2,6}-[A-Z]{2,8}-[0-9]{4}$|^[A-Z]{2,6}-[A-Z]+-[0-9]{4}$"
  title:
    type: string
    minLength: 3
  artifactType:
    type: string
    enum:
      - Charter
      - Principle
      - Standard
      - Specification
      - ArchitectureReview
      - GovernanceDecision
      - EngineeringPackage
      - Assurance
      - Template
      - Registry
      - Schema
      - Index
  status:
    type: string
    enum:
      - Placeholder
      - Draft
      - Active
      - Approved
      - Frozen
      - Superseded
      - Archived
  version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+(\\.[0-9]+)?$"
  authority:
    type: string
    minLength: 3
  owners:
    type: array
    minItems: 1
    items:
      type: string
      minLength: 2
  path:
    type: string
    minLength: 1
  summary:
    type: string
  dependencies:
    type: array
    items:
      type: string
  conformance:
    type: object
    additionalProperties: false
    required:
      - framework
      - clauses
    properties:
      framework:
        type: string
      clauses:
        type: array
        items:
          type: string
  tags:
    type: array
    items:
      type: string
  lineage:
    type: object
    additionalProperties: false
    properties:
      supersedes:
        type: array
        items:
          type: string
      supersededBy:
        type: string
  automation:
    type: object
    additionalProperties: false
    properties:
      machineReadable:
        type: boolean
      validationProfile:
        type: string
      registryVersion:
        type: string
